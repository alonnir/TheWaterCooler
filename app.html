<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheWaterCooler</title>
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TheWaterCooler" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-content">
        <h1>TheWaterCooler</h1>
        <div class="nav-right">
          <div id="user-info" class="user-info"></div>
          <button id="signout-btn" class="btn-secondary" type="button">Sign Out</button>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <section class="news-header">
        <h2>Most Talked-About Stories</h2>
        <div class="controls controls-top">
          <label>Top stories <input id="top-count" type="number" min="1" max="25" value="12" /></label>
          <label>Lookback (hours) <input id="lookback-hours" type="number" min="1" max="120" value="36" /></label>
          <label>
            Tone
            <select id="tone-select">
              <option value="neutral">Neutral</option>
              <option value="optimistic">Optimistic</option>
              <option value="serious">Serious</option>
            </select>
          </label>
          <button id="settings-toggle" class="btn-refresh btn-ghost" type="button">Settings</button>
          <button id="refresh-btn" class="btn-refresh" type="button">Refresh</button>
        </div>

        <div class="controls controls-categories">
          <h3>Categories</h3>
          <div id="category-filters" class="category-buttons"></div>
        </div>

        <div id="settings-panel" class="controls controls-grid" hidden>
          <div>
            <h3>Sources</h3>
            <div id="source-filters" class="option-grid"></div>
          </div>
        </div>

        <div id="last-update" class="last-update"></div>
      </section>

      <div id="loading" class="loading">Loading your briefing...</div>
      <div id="error-container" class="error-message"></div>
      <section id="news-container" class="news-container"></section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/pwa.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
